_schema-version: "3.2"
ID: bpwf
description: Generated by Fiori Tools
version: 0.0.1
modules:
- name: bpwf-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: bpwf-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - bpwf.zip
      name: bpwf
      target-path: resources/
    - artifacts:
      - workflowuimodule.zip
      name: workflowuimodule
      target-path: resources/
- name: bpwf
  type: html5
  path: .
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: bpwf-destination-content
  type: com.sap.application.content
  requires:
  - name: bpwf-destination-service
    parameters:
      content-target: true
  - name: bpwf-repo-host
    parameters:
      service-key:
        name: bpwf-repo-host-key
  - name: uaa_bpwf
    parameters:
      service-key:
        name: uaa_bpwf-key
  parameters:
    content:
      subaccount:
        destinations:
        - Name: bpmanaged_approuter_bpwf_repo_host
          ServiceInstanceName: bpwf-html5-service
          ServiceKeyName: bpwf-repo-host-key
          sap.cloud.service: bpmanaged_approuter
        - Authentication: OAuth2UserTokenExchange
          Name: bpmanaged_approuter_uaa_bpwf
          ServiceInstanceName: bpwf-xsuaa-service
          ServiceKeyName: uaa_bpwf-key
          sap.cloud.service: bpmanaged_approuter
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: workflowuimodule
  type: html5
  path: workflow-ui-module
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: bpwf-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: bpwf-html5-service
    service-plan: app-host
- name: bpwf-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        subaccount:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: bpwf-destination-service
    service-plan: lite
- name: uaa_bpwf
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: bpwf-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
